# quad-schema.yaml
# encoding: utf-8

engine:
  processors:
    - lua_processor@*quad*main_proc
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*quad*es_trans
    - script_translator
    - punct_translator
    - reverse_lookup_translator
  filters:
    - lua_filter@*phrase
    - simplifier
    - uniquifier

es:
  dictionary: latin
